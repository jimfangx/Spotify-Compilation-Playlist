<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spotify Compilation Playlist</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      margin: 2rem;
      max-width: 42rem;
    }

    a {
      color: #0b6bcb;
    }

    code {
      background: #f4f4f4;
      border-radius: 4px;
      padding: 0.1rem 0.3rem;
    }
  </style>
</head>
<body>
  <h1>Spotify Compilation Playlist</h1>
  <p>
    <a href="/login">Authorize with Spotify</a>
  </p>
  <p>
    The nightly job should call <code>/cron/update</code> with the configured cron secret.
  </p>
  <p id="status"></p>

  <script>
    fetch('/auth/status')
      .then((response) => response.json())
      .then((status) => {
        document.getElementById('status').textContent = status.authorized
          ? `Authorized. Refresh token expires around ${status.refreshTokenExpiresAt || 'unknown'}.`
          : 'Not authorized yet.';
      })
      .catch(() => {
        document.getElementById('status').textContent = 'Status unavailable.';
      });
  </script>
</body>
</html>
